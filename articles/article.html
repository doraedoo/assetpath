<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO 元标签（会被 JavaScript 更新） -->
    <title>文章 - AssetPath</title>
    <meta name="description" content="阅读 AssetPath 的深度文章。">
    <meta name="keywords" content="资产配置, 税务优化, 公司架构">
    <link rel="canonical" href="https://assetpath.app/articles">
    
    <meta property="og:title" content="文章 - AssetPath">
    <meta property="og:description" content="阅读 AssetPath 的深度文章。">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://assetpath.app/articles">
    <meta property="og:image" content="https://assetpath.app/og-image.png">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="文章 - AssetPath">
    <meta name="twitter:description" content="阅读 AssetPath 的深度文章。">
    
    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 基础样式 -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            color: #0F172A;
            line-height: 1.6;
        }
        
        a { color: inherit; text-decoration: none; }
        
        /* 导航栏 */
        nav {
            background: white;
            border-bottom: 1px solid #E2E8F0;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        nav a {
            color: #0EA5E9;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        nav a:hover {
            color: #0284C7;
        }
        
        /* 主容器 */
        .article-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }
        
        /* 页脚 */
        footer {
            background: #0F172A;
            color: white;
            padding: 40px;
            text-align: center;
            margin-top: 60px;
        }
        
        .footer-content {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .footer-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .footer-desc {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #CBD5E1;
        }
        
        .footer-contact {
            font-size: 13px;
            color: #94A3B8;
        }
        
        .footer-contact a {
            color: #38BDF8;
            transition: color 0.3s ease;
        }
        
        .footer-contact a:hover {
            color: #0EA5E9;
        }
    </style>
    <link rel="stylesheet" href="/css/articles.css">
    
    <!-- Clarity Analytics -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "xaetxmfyda");
    </script>
</head>
<body>
    <!-- 导航 -->
    <nav>
        <a href="/articles">← 返回文章列表</a>
    </nav>
    
    <!-- 主容器 -->
    <div class="article-page">
        <div id="article-container">
            <div class="loading">加载文章中...</div>
        </div>
    </div>
    
    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <div class="footer-title">AssetPath｜资产蓝图</div>
            <p class="footer-desc">复杂世界里，找到适合自己的蓝图。</p>
            <div class="footer-contact">
                <p>Questions? <a href="mailto:hello@assetpath.app">hello@assetpath.app</a></p>
                <p style="margin-top: 12px; font-size: 12px;">
                    © 2025 AssetPath. All rights reserved.<br>
                    Operated by MindRock Smart Technology Limited.
                </p>
            </div>
        </div>
    </footer>
    
    <!-- Articles Loader - Markdown Driven -->
    <script src="/js/articles-loader.js"></script>
    <script>
        function getArticleSlug() {
    const params = new URLSearchParams(window.location.search);
    return params.get('slug');
}
        
        document.addEventListener('DOMContentLoaded', async function() {
            const slug = getArticleSlug();
            if (slug) {
                await renderArticleDetail(slug, 'article-container');
            } else {
                document.getElementById('article-container').innerHTML = 
                    '<div class="error">文章未找到。<a href="/articles">返回文章列表</a></div>';
            }
        });
    </script>
</body>
</html>
